<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="resetpasseword.css">
    <link rel="shortcut icon" href="../assets/logo1.jpg" type="image/x-icon">
    <title>Reset-password | TRUYENHAY</title>
</head>

<body class="auth-page">
    <div class="video-background">
        <video autoplay muted loop id="background-video">
            <source src="../assets/Download.mp4" type="video/mp4">
        </video>
    </div>

    <main class="auth-shell">
        <section class="auth-card auth-card--compact auth-card--reset">
            <div class="auth-content">
                <a href="../index.html" class="brand-logo">
                    <img src="../assets/logo1.jpg" alt="Logo">
                    <span>TRUYENHAY</span>
                </a>
                <h1 class="auth-title">Khôi Phục Mật Khẩu</h1>
                <p class="auth-subtitle">Nhập mã xác thực và mật khẩu mới của bạn.</p>

                <form class="auth-form">
                    <div>
                        <label class="field-label" for="code">Mã xác thực</label>
                        <input type="text" id="code" placeholder="Nhập mã code" required>
                    </div>

                    <div>
                        <label class="field-label" for="new-password">Mật khẩu mới</label>
                        <input type="password" id="new-password" placeholder="••••••••" required>
                    </div>

                    <div>
                        <label class="field-label" for="confirm-password">Xác nhận mật khẩu</label>
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                    </div>

                    <a href="./login.html" class="btn-primary">Khôi phục mật khẩu</a>
                </form>

                <div class="meta-link">
                    Bạn đã có tài khoản? <a class="text-link" href="./login.html">Đăng nhập</a>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
