<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <link rel="shortcut icon" href="../assets/logo1.jpg" type="image/x-icon">
    <title>Login | TRUYENHAY</title>
</head>

<body class="auth-page">
    <div class="video-background">
        <video autoplay muted loop id="background-video">
            <source src="../assets/Download.mp4" type="video/mp4">
        </video>
    </div>

    <main class="auth-shell">
        <section class="auth-card auth-card--login">
            <div class="auth-media">
                <video class="auth-video" loop autoplay muted>
                    <source src="../assets/Download.mp4" type="video/mp4">
                </video>
            </div>

            <div class="auth-content">
                <a href="../index.html" class="brand-logo">
                    <img src="../assets/logo1.jpg" alt="logo">
                    <span>TRUYENHAY</span>
                </a>
                <h1 class="auth-title">Đăng Nhập</h1>
                <p class="auth-subtitle">Đăng nhập tài khoản của bạn</p>

                <form class="auth-form">
                    <div>
                        <label class="field-label" for="login-email">Email</label>
                        <input id="login-email" type="email" placeholder="email@example.com" required>
                    </div>
                    <div>
                        <label class="field-label" for="login-password">Mật khẩu</label>
                        <input id="login-password" type="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-row form-row--end">
                        <a class="text-link" href="./forgot.html">Quên mật khẩu?</a>
                    </div>
                    <a href="../index.html" class="btn-primary">Đăng nhập</a>
                </form>

                <div class="social-login">
                    <a href="#" class="social-btn">
                        <img src="../assets/search.png" alt="Google">
                        Google
                    </a>
                    <a href="#" class="social-btn">
                        <img src="../assets/facebook.png" alt="Facebook">
                        Facebook
                    </a>
                </div>

                <div class="meta-link">
                    Bạn không có tài khoản? <a class="text-link" href="./signup.html">Đăng ký</a>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
