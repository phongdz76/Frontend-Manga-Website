<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signup.css">
    <link rel="shortcut icon" href="../assets/logo1.jpg" type="image/x-icon">
    <title>SignUp | TRUYENHAY</title>
</head>

<body class="auth-page">
    <div class="video-background">
        <video autoplay muted loop id="background-video">
            <source src="../assets/Download.mp4" type="video/mp4">
        </video>
    </div>

    <main class="auth-shell">
        <section class="auth-card auth-card--signup">
            <div class="auth-content">
                <a href="../index.html" class="brand-logo">
                    <img src="../assets/logo1.jpg" alt="Logo">
                    <span>TRUYENHAY</span>
                </a>
                <h1 class="auth-title">Đăng Ký</h1>
                <p class="auth-subtitle">Đăng ký tài khoản của bạn</p>

                <form class="auth-form">
                    <div>
                        <label class="field-label" for="name">Họ và tên</label>
                        <input type="text" id="name" placeholder="Nguyen Van A" required>
                    </div>

                    <div>
                        <label class="field-label" for="email">Email</label>
                        <input type="email" id="email" placeholder="email@example.com" required>
                    </div>

                    <div>
                        <label class="field-label" for="password">Mật khẩu</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <a href="./login.html" class="btn-primary">Tạo tài khoản</a>
                </form>

                <div class="social-login">
                    <a href="#" class="social-btn">
                        <img src="../assets/search.png" alt="Google">
                        Google
                    </a>
                    <a href="#" class="social-btn">
                        <img src="../assets/facebook.png" alt="Facebook">
                        Facebook
                    </a>
                </div>

                <div class="meta-link">
                    Bạn đã có tài khoản? <a class="text-link" href="./login.html">Đăng nhập</a>
                </div>
            </div>

            <div class="auth-media">
                <video class="auth-video" loop autoplay muted>
                    <source src="../assets/waifu.mp4" type="video/mp4">
                </video>
            </div>
        </section>
    </main>
</body>

</html>
